<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGPT Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Mobile Header -->
        <div class="mobile-header" id="mobileHeader">
            <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="Open menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1 class="mobile-title">ChatGPT Clone</h1>
            <button class="mobile-new-chat-btn" onclick="startNewChat()" aria-label="New chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="startNewChat()">
                    <span>+</span> New chat
                </button>
                <button class="sidebar-toggle desktop-only" onclick="toggleSidebar()" title="Close sidebar" aria-label="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </button>
                <button class="sidebar-close mobile-only" onclick="toggleMobileSidebar()" aria-label="Close sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="chat-history" id="chatHistory"></div>
            <div class="sidebar-footer">
                <button onclick="exportChat('markdown')" class="export-btn">📥 Export MD</button>
                <button onclick="exportChat('json')" class="export-btn">📥 Export JSON</button>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">U</div>
                    <span>User</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <button class="sidebar-open-btn desktop-only" id="sidebarOpenBtn" onclick="toggleSidebar()" title="Open sidebar" aria-label="Open sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
            
            <header class="chat-header desktop-only">
                <h2>ChatGPT Clone</h2>
                <span class="model-badge">Llama 3 8B</span>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <h1>How can I help you today?</h1>
                    <p>Ask me anything - I'm powered by Llama 3 8B via OpenRouter</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Message ChatGPT Clone..." rows="1"
                        onkeydown="handleKeyDown(event)" inputmode="text"></textarea>
                    <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceInput()" title="Voice input" aria-label="Voice input">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <div class="temp-chat-wrapper">
                    <button id="tempChatBtn" onclick="toggleTemporaryChat()" class="temp-chat-btn">
                        🌐 Normal
                    </button>
                </div>
                <div id="tempChatIndicator" class="temp-indicator" style="display: none;">
                    🔒 Private mode - Chats won't be saved
                </div>
                <p class="disclaimer">AI can make mistakes. Consider checking important information.</p>
            </div>
        </main>
    </div>

    <!-- Rename Chat Modal -->
    <div id="renameModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Rename Chat</h3>
            <input type="text" id="renameInput" placeholder="Enter new title...">
            <div class="modal-actions">
                <button onclick="closeRenameModal()">Cancel</button>
                <button onclick="confirmRename()">Save</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
